<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clique cover</title>
</head>
<body>
    <div id="everything-box">
        <div id="title-box">
            <h1>Clique cover algorithm comparison</h1>
        </div>
        <div id="menu-box">
            <div id="menu-algo-select">
                <h3>Available algorithms:</h3>
                <div id="menu-algo-list">
                </div>
            </div>
            <div id="menu-sim-params">
                <div id="menu-nodes-min">
                    <input type="range" id="slider-nodes-min">
                </div>
                <div id="menu-nodes-max">
                    <input type="range" id="slider-nodes-max">
                </div>
                <div id="menu-nodes-step">
                    <input type="range" id="slider-nodes-step">
                </div>
                <div id="menu-graph-density">
                    <input type="range" id="slider-graph-density">
                </div>
            </div>
        </div>
        <div id="launch-box">
            <button type="button" id="button-launch">Launch</button> 
        </div>
    </div>
</body>
</html>
